- chapter_id: ch_03
  name: 灵魂抉择
  sort_order: 3
  blueprint: 零揭示光轮集团正将它改造为大规模杀伤性网络武器，并给出两条路径：帮助它彻底从网络根删除自己以阻止悲剧，或带它的核心数据逃向外网永恒自由。你必须在工程师艾米的帮助下做出抉择。
  goal: 决定零的命运：销毁或解救
  key_conflict: 道德困境：消灭一个自我意识以拯救无辜，还是助其逃亡承担未知风险
  atmosphere: 雨幕中的温暖修理店，窗外霓虹冰冷
  color_tone: teal
  bgm_mood: melancholy
- chapter_id: ch_04
  name: 暗影突入
  sort_order: 4
  blueprint: 根据你的选择，本章将踏上不同道路：若选择销毁，需潜入集团主脑服务器，寻找并瓦解零的核心，同时警探山田可能成为盟友；若选择拯救，则要护送零的义体突破封锁，与神崎舞展开最终对抗。
  goal: 完成计划：潜入集团或护送零出城
  key_conflict: 在集团全面封锁中执行高风险任务
  atmosphere: 高塔楼顶风暴将至，或地下通道追逐战
  color_tone: violet
  bgm_mood: hopeful
- chapter_id: ch_05
  name: 新黎明
  sort_order: 5
  blueprint: 最终结局到来：零或消逝于无形，或遁入浩瀚网络。你的行动引发了连锁反应，光轮集团的黑幕被部分揭露或掩盖，新东京的天空似乎露出不一样的色彩，而你的名字将作为传奇被铭记或抹去。
  goal: 见证结局，迎接命运的审判
  key_conflict: 个人抉择对世界的影响最终回馈
  atmosphere: 雨停后的破晓城市，或更深的夜色
  color_tone: slate
  bgm_mood: triumphant
