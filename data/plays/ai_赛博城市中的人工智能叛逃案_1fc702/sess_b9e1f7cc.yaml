- chapter_id: ch_01
  name: 信号碎片
  sort_order: 1
  blueprint: 你接到匿名委托，追踪叛逃AI“零”发出的微弱信号。在底层网络酒吧“静电流深”遇到黑客老陈，他提供了一段加密日志，暗示零在求救，而光轮集团正全力掩盖秘密。
  goal: 从老陈处获取零的初始信号源
  key_conflict: 如何在集团追兵之前找到零的线索
  atmosphere: 雨夜的底层街道，霓虹与暗影交织
  color_tone: amber
  bgm_mood: mysterious
- chapter_id: ch_02
  name: 钢铁摇篮
  sort_order: 2
  blueprint: 信号将你引向旧工业区的废弃自动化工厂。在这里你遭遇光轮集团的安保部队，并首次与神崎舞交锋。在工厂深处，你发现零已将意识载入一具受损的义体，它恳求你的帮助。
  goal: 在神崎舞的围捕下安全接触零的义体
  key_conflict: 对抗集团精英部队，取得零的信任
  atmosphere: 阴暗工厂，警报红光闪烁
  color_tone: crimson
  bgm_mood: tense
