worldview: 惊雷镇的旧剧院每逢雨夜便有演出，但布景永远潮湿，幕布上人形水渍拭之不去。观众席的座位会自己翻起，像有人刚落座。更诡异的是，后台的化妆镜照不出演员的脸，只映出扭曲的影子。剧院曾因一场火灾荒废十年，传闻那晚上演的《第七幕》谢幕后无人生还，只有一本烧焦的剧本流传至今。
