chapters:
- id: ch_prologue
  sort_order: 0
  name: 归乡
  type: cinematic
  description: 父亲病逝，你带着他的骨灰回到陌生的故乡。
  color_tone: '#8899aa'
  bgm_mood: melancholy
  key_event: prologue_complete
  required_npcs: []
  required_items:
  - item_urn
  success_condition: 安葬父亲，离开墓地进入小镇。
  sub_task_templates: []
  goal: ''
  key_conflict: ''
  atmosphere: ''
- id: ch_01
  sort_order: 1
  name: 闻声·异样
  type: task
  description: '你偶然走到老街深处，看见一座门庭冷清的老戏院。 走进去听戏时，锣鼓响起、唱腔入耳， 你突然头痛心悸、指尖发麻——身体先于记忆，对这片戏台产生了回响。

    '
  color_tone: '#8899bb'
  bgm_mood: melancholy
  key_event: first_resonance
  required_npcs:
  - npc_xiaohua
  - npc_laozhou
  required_items:
  - item_old_trunk
  - item_old_jinghu
  success_condition: '玩家进入戏台，与小华和老周有过初步互动， 体验到第一次"身体共鸣"的异样感。 小华和老周对玩家产生初步印象（投票通过）。

    '
  sub_task_templates:
  - id: st_ch_01_1781243693943_cnwv
    mode: dialogue
    title: 与小华对话
    description: 在戏台内遇到小华，进行对话了解戏班情况
    target_npc_id: npc_xiaohua
  goal: ''
  key_conflict: ''
  atmosphere: ''
- id: ch_02
  sort_order: 2
  name: 探寻·疑云
  type: task
  description: '身体的异样感挥之不去，你开始主动探索小镇。 走访茶馆、祠堂、码头，翻阅父亲留下的旧物。 你发现老艺人见到你时眼神复杂、旧箱中藏着孩童戏服和童年照片——
    真相近在眼前，却被一层看不见的隔膜牢牢封住。

    '
  color_tone: '#ccbb99'
  bgm_mood: melancholy
  key_event: evidence_collected
  required_npcs:
  - npc_chen
  - npc_xiaohua
  - npc_laozhou
  - npc_meiyi
  - npc_laoli
  required_items:
  - item_child_costume
  - item_father_script
  - item_childhood_photo
  - item_father_single_photo
  - item_genealogy
  - item_stage_group_photo
  - item_temple_tablet
  success_condition: '玩家在父亲旧居、茶馆、祠堂、码头探索， 收集到至少3件关键旧物（孩童戏服/手抄剧本/童年照片）， 并通过NPC对话拼凑出"戏班神童"的线索。
    陈师傅、梅姨、老周、老李至少3人确认玩家已了解到关键信息。

    '
  sub_task_templates:
  - id: st_ch_02_1781243693943_d9cm
    mode: dialogue
    title: 在茶馆与梅姨对话
    description: 梅姨告诉你'戏班神童'的传闻
    target_npc_id: npc_meiyi
  - id: st_ch_02_1781243693943_9qcr
    mode: dialogue
    title: 把孩童戏服给陈师傅看
    description: 找到孩童戏服后拿给陈师傅看，观察他的反应
    target_npc_id: npc_chen
  goal: ''
  key_conflict: ''
  atmosphere: ''
- id: ch_03
  sort_order: 3
  name: 忆归·真相
  type: task
  description: '在某个契机下——触摸旧戏服、站上老戏台，或听到某段关键唱腔—— 你尘封的记忆彻底觉醒。 你本是戏班自幼培养的天才小传人，一次登台意外让你重伤失忆，
    父亲为保护你，忍痛放下一切，带你远走他乡。

    '
  color_tone: '#ddaa77'
  bgm_mood: melancholy
  key_event: memory_awakened
  required_npcs:
  - npc_chen
  - npc_laozhou
  - npc_meiyi
  required_items:
  - item_child_costume
  success_condition: '玩家的记忆觉醒（通过触摸孩童戏服/站上戏台触发）， 并与陈师傅、老周进行真相确认对话。 至少陈师傅和老周两人确认玩家已恢复记忆并接受了真相。

    '
  sub_task_templates:
  - id: st_ch_03_1781243693943_ozhy
    mode: dialogue
    title: 把孩童戏服给陈师傅看
    description: 带着孩童戏服找到陈师傅，触发记忆觉醒
    target_npc_id: npc_chen
  - id: st_ch_03_1781243693943_f4k9
    mode: dialogue
    title: 陈师傅说出真相
    description: 陈师傅终于告诉你：你是戏班的小传人，父亲为你放弃了一切
    target_npc_id: npc_chen
  goal: ''
  key_conflict: ''
  atmosphere: ''
- id: ch_04
  sort_order: 4
  name: 目睹·凋零
  type: task
  description: '记忆归位后，你更清晰地看见戏班如今的处境： 演员青黄不接、场地破旧失修、观众流失严重。 父亲用半生牵挂守护的戏班，在时代浪潮中不断凋零。

    '
  color_tone: '#998877'
  bgm_mood: melancholy
  key_event: decline_accepted
  required_npcs:
  - npc_chen
  - npc_xiaohua
  - npc_laozhou
  - npc_meiyi
  required_items: []
  success_condition: '玩家以恢复记忆的视角重新审视戏班的每一个角落和每一个人， 与所有NPC深入对话，了解戏班凋零的全貌。 所有NPC对玩家表达对戏班未来的担忧和无奈。

    '
  sub_task_templates:
  - id: st_ch_04_1781243693943_n9d3
    mode: dialogue
    title: 与陈师傅谈戏班现状
    description: 陈师傅讲述三十年来戏班一步步衰落的过程
    target_npc_id: npc_chen
  - id: st_ch_04_1781243693943_ngbz
    mode: dialogue
    title: 了解小华的困境
    description: 小华吐露他想离开但又舍不得的矛盾心理
    target_npc_id: npc_xiaohua
  goal: ''
  key_conflict: ''
  atmosphere: ''
- id: ch_05
  sort_order: 5
  name: 承戏·重振
  type: task
  description: '你终于明白：父亲守护你，也守护戏班。 你选择留下，接过传承的重担，重整戏班。 以父亲的名义、以梨园传人的身份，让这座没落的梨园重燃荣光。

    '
  color_tone: '#ddaa66'
  bgm_mood: melancholy
  key_event: inheritance_accepted
  required_npcs:
  - npc_chen
  - npc_xiaohua
  - npc_laozhou
  - npc_meiyi
  - npc_laoli
  required_items:
  - item_child_costume
  - item_father_script
  success_condition: '玩家明确表达传承意愿， 所有NPC确认并支持玩家的决定， 陈师傅正式交付父亲的京胡（或戏班传承信物）。 触发结局。

    '
  sub_task_templates:
  - id: st_ch_05_1781243693943_7dgw
    mode: dialogue
    title: 告诉陈师傅你的决定
    description: 你决定留下来继承戏班。陈师傅泪流满面，交出父亲的京胡
    target_npc_id: npc_chen
  - id: st_ch_05_1781243693943_80sz
    mode: dialogue
    title: 穿上孩童戏服1
    description: 穿上孩童戏服，站上焕然一新的戏台——薪火相传
    target_npc_id: npc_chen
  goal: ''
  key_conflict: ''
  atmosphere: ''
