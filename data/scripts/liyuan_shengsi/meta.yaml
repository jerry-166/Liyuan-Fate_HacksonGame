# 剧本元信息 — 梨园生死
script_id: "liyuan_shengsi"
name: "梨园生死"
version: "1.0"
author: "Team A"

worldview: |
  江南水乡小镇梨溪镇，民国时期。
  镇上曾有一个名震一方的戏班——"梨园班"。
  三十年前，班主柳三秋是万人空巷的名角，一出《空城计》轰动百里。
  他的儿子自幼在戏班长大，是百年难遇的戏曲神童。
  一场登台意外让神童重伤昏迷、丧失了所有记忆。
  柳三秋为保护儿子，毅然放下一切，带着失忆的孩子远走他乡。
  三十年后，柳三秋病逝。你——那个曾经的戏曲神童，带着父亲的骨灰回到故乡。

