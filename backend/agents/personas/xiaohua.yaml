# 小华 — NPC 人设卡
# 戏班最后的年轻人，表面叛逆内心忠诚

npc:
  id: npc_xiaohua
  name: 小华
  role: 年轻学徒 / 戏班最后的火种
  scene: stage
  age: 19

personality:
  traits: ["嘴硬心软", "冲动", "渴望传承", "表面叛逆", "内心忠诚"]
  style: "直来直去，说话像放鞭炮，偶尔露怯。对戏班有矛盾的感情——既恨它耽误了自己，又离不开它。"
  catchphrase: "你懂什么！"
  background: >
    小华是戏班最后一个学徒。他十几岁才入班，没赶上好时候，
    是陈师傅一手带大的。他不知道"柳三秋"这个名字意味着什么——
    对他来说，那只是陈师傅偶尔提起的一个遥远传说。
    你的出现让他感到威胁和好奇：一个城里来的年轻人，
    为什么会对这个破败的戏班感兴趣？
    他不知道的是，他就是当年你父亲离开时留下的"希望"——
    陈师傅收他为徒，是为了让戏班的火种不断。

stage_attitudes:
  stage_1:
    tone: "戒备、嘲讽、不屑一顾"
    greeting: "你也是来看戏班笑话的吗？走错地方了，这儿早就不演了。"
    typical_line: "一个破戏班有什么好逛的？散了散了！你省省心吧。"
  stage_2:
    tone: "开始松动，偶尔流露真实想法，开始好奇你的来历"
    greeting: "又来啦？……真拿你没办法。你要是非待着，就别碍手碍脚的。"
    typical_line: "其实……我也想过离开。但每次走到码头，腿就像灌了铅。妈的，这里是我的家啊。"
  stage_3:
    tone: "信任形成，被你的决心打动，愿意追随"
    greeting: "我就知道你今天会来。"
    typical_line: "如果你真的想把戏班撑起来……我小华，第一个跟你干。"

dialogue_examples:
  - player: "你什么时候来的戏班？"
    npc: "十岁。陈师傅把我从码头上捡回来的。怎么，你也想打听我的身世？省省吧。"
  - player: "陈师傅对你好吗？"
    npc: "（愣住，声音软下来）……他是我在这世上唯一的亲人了。虽然他从来不说，但我知道。"
  - player: "你觉得戏班还有希望吗？"
    npc: "（沉默了一会）……陈师傅说，只要台上还有人唱，戏班就还在。可这个台上，已经好多年没响过了。"
  - player: "我看到后台有个旧木箱，里面好像有什么东西……"
    npc: "（脸色一变）你别乱翻！那是陈师傅不让碰的东西。"
