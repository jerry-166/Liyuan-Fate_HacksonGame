<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- ★ 移动端适配：禁用缩放、viewport-fit=cover 保证全屏 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- ★ iOS 全屏 Web App 支持 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- ★ Android 全屏 -->
  <meta name="mobile-web-app-capable" content="yes" />
  <title>梨园生死</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      overflow: hidden;
      /* ★ 阻止移动端下拉刷新/橡皮筋效果 */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
      /* ★ 阻止 iOS 长按选择/弹出菜单 */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      /* ★ 禁用移动端滑动调节亮度/声音等浏览器手势 */
      touch-action: none;
      -webkit-touch-callout: none;
    }
    /* ★ 强制所有元素禁用浏览器手势 */
    #game-container, canvas {
      touch-action: none;
    }
    #game-container {
      width: 100vw; height: 100vh;
      display: block;
      /* ★ 安全区适配（iPhone 刘海屏） */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    /* 自由文本输入框（对话时显示在游戏画面下方） */
    #free-input-wrapper {
      display: none;           /* 默认隐藏 */
      position: fixed;
      bottom: max(8px, env(safe-area-inset-bottom, 8px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: min(600px, calc(100vw - 40px));
      max-width: calc(100vw - 40px);
    }
    #free-input-wrapper.visible { display: flex; }
    #free-input {
      flex: 1;
      background: #1a1820ee;
      border: 1px solid #88776688;
      border-radius: 6px;
      padding: 8px 14px;
      color: #e8dcc8;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      /* ★ iOS Safari 要求至少 16px 才不自动缩放 */
      font-size: 16px;
      outline: none;
      caret-color: #d4b896;
    }
    #free-input:focus {
      border-color: #d4b896;
      box-shadow: 0 0 6px #88776644;
    }
    #free-input::placeholder { color: #665544; }
    #free-input-send {
      margin-left: 6px;
      background: #2a2820;
      border: 1px solid #88776688;
      border-radius: 6px;
      /* ★ 触控区域至少 44px 符合 iOS HIG */
      padding: 10px 18px;
      min-width: 50px;
      min-height: 44px;
      color: #d4b896;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    #free-input-send:hover { background: #3a3830; border-color: #d4b896; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <!-- ★ 移动端竖屏提示遮罩 -->
  <div id="orientation-warn" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0d0d1a;z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#d4b896;font-family:'Microsoft YaHei','PingFang SC',sans-serif;">
    <div style="font-size:48px;margin-bottom:20px;">🔄</div>
    <div style="font-size:20px;margin-bottom:10px;">请旋转设备</div>
    <div style="font-size:14px;color:#887766;">游戏需要横屏体验</div>
  </div>
  <!-- 自由文本输入区域（由 UIScene 控制 show/hide） -->
  <div id="free-input-wrapper">
    <input id="free-input" type="text" placeholder="输入你想说的话……（Enter 发送）" maxlength="200" autocomplete="off" />
    <button id="free-input-send">发送</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
